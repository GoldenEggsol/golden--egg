<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Easter Egg - WASD Added</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #000; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const gravity = 0.42;
  const friction = 0.82;
  let maxSpeed = 5; 

  let level = 1;
  let distanceTravelled = 0;
  const LEVEL_LENGTH = 8000; 

  let oeuf, oeufRotation, keys, platforms, clouds, enemies, birds, blocks, bricks, pipes, powerups, particles, stars;
  let score = 0;
  let levelStartScore = 0; 
  let gameOver = false;
  let gameWon = false;
  let victoryCode = "";
  let animationId; 
  let finishLine = null;
  
  let welcomeTextInfo = { x: 450, y: 0, active: true };

  let invincible = false;
  let invincibilityTimer = 0;
  let isMega = false;
  let megaTimer = 0;
  let hasJetpack = false;
  let jetpackTimer = 0;

  const themes = {
      1: { bg1: '#1A82C4', bg2: '#66D2EA', cloud: 'rgba(255, 255, 255, 0.9)', pTop: '#4CAF50', pSide: '#225B22', d1: '#795548', d2: '#3E2723', pipe1: '#4CAF50', pipe2: '#1B5E20' },
      2: { bg1: '#050B14', bg2: '#1A233A', cloud: 'rgba(200, 200, 220, 0.4)', pTop: '#2A662C', pSide: '#0F2E0F', d1: '#3D2A24', d2: '#1F1311', pipe1: '#2E7D32', pipe2: '#003300' },
      3: { bg1: '#4A0E4E', bg2: '#CB2D3E', cloud: 'rgba(255, 150, 150, 0.6)', pTop: '#D32F2F', pSide: '#7F0000', d1: '#4A148C', d2: '#210F4D', pipe1: '#FF9800', pipe2: '#E65100' },
      4: { bg1: '#0F0C29', bg2: '#24243E', cloud: 'rgba(0, 255, 255, 0.2)', pTop: '#00E5FF', pSide: '#006064', d1: '#1A237E', d2: '#000000', pipe1: '#D500F9', pipe2: '#4A148C' },
      5: { bg1: '#FFDF00', bg2: '#FFFFFF', cloud: 'rgba(255, 255, 255, 0.9)', pTop: '#FFFFFF', pSide: '#BDBDBD', d1: '#FFD700', d2: '#FF8F00', pipe1: '#FFD700', pipe2: '#FF6F00' }
  };

  function initGame(resetType = 'fullReset') {
    if (animationId) cancelAnimationFrame(animationId); 

    oeuf = { x: 100, y: 150, w: 34, h: 44, vx: 0, vy: 0, speed: 0.8, jumpPower: -14, grounded: false };
    oeufRotation = 0;
    gameOver = false;
    gameWon = false;
    distanceTravelled = 0;
    finishLine = null;
    
    welcomeTextInfo.active = true;
    welcomeTextInfo.x = 450;
    welcomeTextInfo.y = canvas.height / 3;

    if (resetType === 'fullReset') {
        score = 0;
        levelStartScore = 0;
        level = 1;
    } else if (resetType === 'checkpoint') {
        score = levelStartScore; 
    } else if (resetType === 'nextLevel') {
        levelStartScore = score; 
    } else if (resetType === 'skip') {
        score = 0;
        levelStartScore = 0;
    }

    invincible = false;
    invincibilityTimer = 0;
    isMega = false;
    megaTimer = 0;
    hasJetpack = false;
    jetpackTimer = 0;
    maxSpeed = 5;
    keys = { right: false, left: false, up: false }; 
    
    platforms = [{ x: 0, y: canvas.height - 200, w: window.innerWidth + 400, h: canvas.height, seed: Math.random() }];
    enemies = []; birds = []; blocks = []; bricks = []; pipes = []; powerups = []; particles = []; clouds = []; stars = [];
    
    for(let i=0; i<8; i++) {
        clouds.push({ x: Math.random() * canvas.width * 2, y: Math.random() * (canvas.height / 2), scale: Math.random() * 0.8 + 0.5, speed: Math.random() * 0.3 + 0.1 });
    }

    if (level >= 2 && level <= 4) {
        for(let i=0; i<150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 0.5, alpha: Math.random(), fadeDir: Math.random() > 0.5 ? 1 : -1 });
        }
    }
  }

  window.addEventListener('keydown', e => {
    if (e.code === 'Digit1' || e.code === 'Numpad1') { level = 1; initGame('skip'); update(); return; }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { level = 2; initGame('skip'); update(); return; }
    if (e.code === 'Digit3' || e.code === 'Numpad3') { level = 3; initGame('skip'); update(); return; }
    if (e.code === 'Digit4' || e.code === 'Numpad4') { level = 4; initGame('skip'); update(); return; }
    if (e.code === 'Digit5' || e.code === 'Numpad5') { level = 5; initGame('skip'); update(); return; }

    if (gameOver) {
        if (e.code === 'Enter' || e.code === 'Space') { initGame('checkpoint'); update(); }
        if (e.code === 'KeyR') { initGame('fullReset'); update(); }
        return; 
    }
    if (gameWon) return; 

    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
        keys.up = true;
        if (oeuf.grounded && !hasJetpack) {
            oeuf.vy = oeuf.jumpPower;
            oeuf.grounded = false;
        }
    }
  });
  
  window.addEventListener('keyup', e => {
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
        keys.up = false;
        if (oeuf.vy < 0 && !hasJetpack) oeuf.vy *= 0.5; 
    }
  });

  function spawnPowerup(x, y) {
      let rand = Math.random();
      let type = rand < 0.33 ? 'star' : (rand < 0.66 ? 'mega' : 'jetpack');
      powerups.push({ x: x + 10, y: y, w: 20, h: 20, vx: 2, vy: -8, type: type });
  }

  function breakBrick(br) {
      for(let i=0; i<8; i++) {
          particles.push({
              x: br.x + br.w/2, y: br.y + br.h/2,
              vx: (Math.random() - 0.5) * 12, vy: Math.random() * -10 - 4,
              size: Math.random() * 8 + 4, life: 1.0,
              rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.5,
              color: '#A0522D'
          });
      }
  }

  function drawRabbit(x, y, w, h, isFacingLeft, yOffset) {
    ctx.save();
    ctx.translate(x + w/2, y + h + yOffset); 
    if (!isFacingLeft) ctx.scale(-1, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, -yOffset, 20, 5, 0, 0, Math.PI*2); ctx.fill(); 
    ctx.fillStyle = level === 1 || level === 5 ? '#F5F5F5' : '#888'; 
    ctx.beginPath(); ctx.ellipse(5, -15, 18, 15, -Math.PI/8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(22, -10, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = level === 1 || level === 5 ? '#F5F5F5' : '#888';
    ctx.beginPath(); ctx.arc(-10, -25, 14, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-5, -42, 5, 15, Math.PI/6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-15, -45, 5, 15, -Math.PI/8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FF99AA';
    ctx.beginPath(); ctx.ellipse(-5, -42, 2.5, 10, Math.PI/6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-15, -45, 2.5, 10, -Math.PI/8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E60000';
    ctx.beginPath(); ctx.arc(-15, -28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(-16, -29, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawBird(x, y, isFacingLeft) {
      ctx.save();
      ctx.translate(x, y);
      if (!isFacingLeft) ctx.scale(-1, 1);
      
      let wingAngle = Math.sin(Date.now() / 100) * 15;
      
      ctx.fillStyle = level > 1 && level < 5 ? '#FFF' : '#222';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(15, -5 + wingAngle);
      ctx.lineTo(25, 0);
      ctx.lineTo(15, 5 - wingAngle);
      ctx.fill();
      
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-10, -5 - wingAngle);
      ctx.lineTo(-20, -10 - wingAngle);
      ctx.lineTo(-10, 5 - wingAngle);
      ctx.fill();

      ctx.fillStyle = '#E60000';
      ctx.beginPath(); ctx.arc(-15, -2, 2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
  }

  function generateWorld() {
    let lastPlatform = platforms[platforms.length - 1];

    if (distanceTravelled > LEVEL_LENGTH) {
        if (!finishLine && lastPlatform.x + lastPlatform.w < canvas.width * 2) {
            let base_y = canvas.height - 120;
            platforms.push({ x: lastPlatform.x + lastPlatform.w + 100, y: base_y, w: 1000, h: canvas.height, seed: Math.random() });
            finishLine = { x: lastPlatform.x + lastPlatform.w + 600, y: base_y - 300, w: 20, h: 300 };
        }
        return;
    }

    if (lastPlatform.x + lastPlatform.w < canvas.width + 1500) { 
      let gap = Math.random() * 60 + 40; 
      let width = Math.random() * 800 + 400; 
      
      let base_y = Math.max(canvas.height - 350, Math.min(canvas.height - 120, lastPlatform.y + (Math.random() - 0.5) * 80));
      let newPlatform = { x: lastPlatform.x + lastPlatform.w + gap, y: base_y, w: width, h: canvas.height, seed: Math.random() };
      platforms.push(newPlatform);

      let hasPipe = Math.random() > 0.4 && width > 400;
      let pipeX = 0;
      
      if (hasPipe) {
          let pipeH = 60 + Math.random() * 60;
          let hasPiranha = Math.random() < 0.25; 
          pipeX = newPlatform.x + width / 3;
          pipes.push({ 
              x: pipeX, y: base_y - pipeH, w: 60, h: pipeH, 
              hasPlant: hasPiranha, pY: 0, pState: 'hidden', pTimer: Math.random() * 100 
          });
      }

      if (width > 300 && Math.random() > 0.2) { 
          let pattern = Math.floor(Math.random() * 5);
          let startX;

          if (hasPipe) {
              startX = pipeX + 260; 
              if (startX + 200 > newPlatform.x + width) {
                  startX = pipeX - 250; 
              }
          } else {
              startX = newPlatform.x + width / 4 + Math.random() * (width / 4);
          }

          if (startX > newPlatform.x && startX + 200 < newPlatform.x + width) {
              let by1 = base_y - 130; 
              let by2 = base_y - 250; 

              if (pattern === 0) {
                  for(let i=0; i<5; i++) {
                      if(i === 1 || i === 3) blocks.push({ x: startX + i*40, y: by1, w: 40, h: 40, active: true, bounceY: 0 });
                      else bricks.push({ x: startX + i*40, y: by1, w: 40, h: 40 });
                  }
              } else if (pattern === 1) {
                  for(let i=0; i<4; i++) bricks.push({ x: startX + i*40, y: by1, w: 40, h: 40 });
                  blocks.push({ x: startX + 60, y: by2, w: 40, h: 40, active: true, bounceY: 0 });
              } else if (pattern === 2) {
                  blocks.push({ x: startX, y: by1, w: 40, h: 40, active: true, bounceY: 0 });
                  bricks.push({ x: startX + 40, y: by1, w: 40, h: 40 });
                  blocks.push({ x: startX + 80, y: by1, w: 40, h: 40, active: true, bounceY: 0 });
              } else if (pattern === 3) {
                  for(let i=0; i<3; i++) bricks.push({ x: startX + i*40, y: by2, w: 40, h: 40 });
                  blocks.push({ x: startX + 40, y: by1, w: 40, h: 40, active: true, bounceY: 0 });
              } else if (pattern === 4) {
                  bricks.push({ x: startX, y: by1, w: 40, h: 40 });
                  blocks.push({ x: startX + 40, y: by1, w: 40, h: 40, active: true, bounceY: 0 });
                  bricks.push({ x: startX + 80, y: by1, w: 40, h: 40 });
                  bricks.push({ x: startX + 40, y: by2, w: 40, h: 40 });
              }
          }
      }

      if (Math.random() > 0.3) {
          enemies.push({ x: newPlatform.x + width - 100, y: newPlatform.y - 45, w: 40, h: 45, vx: -1.2, vy: 0, grounded: true }); 
      }
      
      if (Math.random() > 0.85) {
          let airY = base_y - 200 - Math.random() * 150;
          birds.push({ x: newPlatform.x + width, y: airY, baseY: airY, w: 30, h: 20, vx: -1.0 - Math.random() * 0.5, seed: Math.random() * 100 });
      }
    }

    if (Math.random() < 0.01) {
      clouds.push({ x: canvas.width + 100, y: Math.random() * (canvas.height / 2), scale: Math.random() * 0.8 + 0.5, speed: Math.random() * 0.3 + 0.1 });
    }
  }

  function handleCollisions(obj, isBrick = false, brickIndex = -1) {
      if (oeuf.x < obj.x + obj.w && oeuf.x + oeuf.w > obj.x && oeuf.y < obj.y + obj.h && oeuf.y + oeuf.h > obj.y) {
          
          if (isMega && isBrick) {
              breakBrick(bricks[brickIndex]); 
              bricks.splice(brickIndex, 1);
              score += 20; 
              return true; 
          }

          if (oeuf.vy < 0 && oeuf.y - oeuf.vy >= obj.y + obj.h - 10) {
              oeuf.vy = 0; 
              oeuf.y = obj.y + obj.h;
              if (isBrick) {
                  breakBrick(bricks[brickIndex]); 
                  bricks.splice(brickIndex, 1);
                  score += 10;
                  return true; 
              }
          } 
          else if (oeuf.vy > 0 && oeuf.y + oeuf.h - oeuf.vy <= obj.y + 15) {
              oeuf.grounded = true; oeuf.vy = 0; oeuf.y = obj.y - oeuf.h;
          } 
          else if (oeuf.vx > 0 && oeuf.x + oeuf.w - oeuf.vx <= obj.x) {
              oeuf.vx = 0; oeuf.x = obj.x - oeuf.w;
          } else if (oeuf.vx < 0 && oeuf.x - oeuf.vx >= obj.x + obj.w) {
              oeuf.vx = 0; oeuf.x = obj.x + obj.w;
          }
      }
      return false;
  }

  function update() {
    if (gameWon) { drawVictory(); return; }
    if (gameOver) return;

    if (invincibilityTimer > 0) {
        invincibilityTimer--;
        maxSpeed = 7; 
        if (invincibilityTimer <= 0) { invincible = false; maxSpeed = 5; }
    }
    if (megaTimer > 0) {
        megaTimer--;
        if (megaTimer <= 0) { isMega = false; }
    }
    if (jetpackTimer > 0) {
        jetpackTimer--;
        if (jetpackTimer <= 0) { hasJetpack = false; }
    }

    let targetW = isMega ? 68 : 34;
    let targetH = isMega ? 88 : 44;
    if (Math.abs(oeuf.w - targetW) > 0.5) {
        let growW = (targetW - oeuf.w) * 0.1;
        let growH = (targetH - oeuf.h) * 0.1;
        oeuf.w += growW;
        oeuf.h += growH;
        oeuf.y -= growH; 
    }

    if (keys.right) oeuf.vx += oeuf.speed;
    if (keys.left) oeuf.vx -= oeuf.speed;
    
    if (hasJetpack) {
        if (keys.up) {
            oeuf.vy -= 0.8; 
            if (oeuf.vy < -7) oeuf.vy = -7; 
            
            particles.push({
                x: oeuf.x + oeuf.w/2 + (Math.random()-0.5)*10, y: oeuf.y + oeuf.h,
                vx: (Math.random() - 0.5) * 2, vy: Math.random() * 3 + 2,
                size: Math.random() * 6 + 3, life: 1.0, rot: 0, color: '#FF9800'
            });
        }
        if (oeuf.vy > 3) oeuf.vy = 3; 
    }

    if (oeuf.vx > maxSpeed) oeuf.vx = maxSpeed;
    if (oeuf.vx < -maxSpeed) oeuf.vx = -maxSpeed;

    oeuf.vx *= friction; 
    oeuf.vy += gravity;
    oeuf.x += oeuf.vx;
    oeuf.y += oeuf.vy;
    oeufRotation += oeuf.vx * 0.08;

    let cameraShift = 0;
    const centerScreen = canvas.width / 2.5; 

    if (oeuf.x > centerScreen) {
        cameraShift = oeuf.x - centerScreen;
        oeuf.x = centerScreen;
    }
    if (oeuf.x < 0) { oeuf.x = 0; oeuf.vx = 0; }

    if (cameraShift > 0) {
        platforms.forEach(p => p.x -= cameraShift);
        enemies.forEach(e => e.x -= cameraShift);
        birds.forEach(b => b.x -= cameraShift);
        blocks.forEach(b => b.x -= cameraShift);
        bricks.forEach(br => br.x -= cameraShift);
        pipes.forEach(p => p.x -= cameraShift);
        powerups.forEach(pu => pu.x -= cameraShift);
        particles.forEach(p => p.x -= cameraShift);
        
        if (welcomeTextInfo.active) {
            welcomeTextInfo.x -= cameraShift;
            if (welcomeTextInfo.x < -600) welcomeTextInfo.active = false;
        }

        if (finishLine) finishLine.x -= cameraShift;
        distanceTravelled += cameraShift;
        score += cameraShift / 10;
    }

    clouds.forEach(c => { c.x -= c.speed; if (cameraShift > 0) c.x -= cameraShift * (c.scale * 0.4); });

    platforms = platforms.filter(p => p.x + p.w > -200);
    clouds = clouds.filter(c => c.x + 200 > -200);
    enemies = enemies.filter(e => e.x + e.w > -100);
    birds = birds.filter(b => b.x + b.w > -100);
    blocks = blocks.filter(b => b.x + b.w > -100);
    bricks = bricks.filter(br => br.x + br.w > -100);
    pipes = pipes.filter(p => p.x + p.w > -100);
    powerups = powerups.filter(pu => pu.x + pu.w > -100 && pu.y < canvas.height);

    generateWorld();

    if (finishLine && oeuf.x + oeuf.w > finishLine.x) {
        if (level < 5) {
            level++;
            score += 2000;
            initGame('nextLevel'); 
            update(); 
            return; 
        } else {
            gameWon = true;
            
            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let randStr = "";
            for(let i=0; i<4; i++) randStr += chars.charAt(Math.floor(Math.random() * chars.length));
            let codeArr = ('26GE' + randStr).split('');
            for (let i = codeArr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [codeArr[i], codeArr[j]] = [codeArr[j], codeArr[i]];
            }
            victoryCode = codeArr.join('');
            
            drawVictory();
            return;
        }
    }

    particles.forEach((p, index) => {
        p.x += p.vx; p.vy += gravity; p.y += p.vy;
        p.life -= p.color === '#FF9800' ? 0.05 : 0.02; 
        if(p.life <= 0) particles.splice(index, 1);
    });

    oeuf.grounded = false;

    platforms.forEach(p => handleCollisions(p));
    
    pipes.forEach(p => {
        handleCollisions(p);
        
        if (p.hasPlant) {
            if (p.pState === 'hidden') {
                p.pTimer--;
                if(p.pTimer <= 0) p.pState = 'up';
            } else if (p.pState === 'up') {
                p.pY -= 1;
                if(p.pY <= -45) { p.pY = -45; p.pState = 'visible'; p.pTimer = 100; }
            } else if (p.pState === 'visible') {
                p.pTimer--;
                if(p.pTimer <= 0) p.pState = 'down';
            } else if (p.pState === 'down') {
                p.pY += 1;
                if(p.pY >= 0) { p.pY = 0; p.pState = 'hidden'; p.pTimer = 100; }
            }

            if (p.pY < -10) {
                let plantHitbox = { x: p.x + 10, y: p.y + p.pY, w: 40, h: -p.pY };
                if (oeuf.x < plantHitbox.x + plantHitbox.w && oeuf.x + oeuf.w > plantHitbox.x && oeuf.y < plantHitbox.y + plantHitbox.h && oeuf.y + oeuf.h > plantHitbox.y) {
                    if (invincible || isMega) { p.hasPlant = false; score += 200; } 
                    else { gameOver = true; }
                }
            }
        }
    });
    
    for (let i = 0; i < bricks.length; i++) {
        if (handleCollisions(bricks[i], true, i)) i--;
    }

    blocks.forEach(b => {
        if (b.bounceY < 0) b.bounceY += 1; 
        if (oeuf.x < b.x + b.w && oeuf.x + oeuf.w > b.x && oeuf.y < b.y + b.h && oeuf.y + oeuf.h > b.y) {
            if (oeuf.vy < 0 && oeuf.y - oeuf.vy >= b.y + b.h - 5) {
                oeuf.vy = 0; oeuf.y = b.y + b.h;
                if (b.active) {
                    b.active = false; b.bounceY = -10; spawnPowerup(b.x, b.y - 20);
                }
            } else if (oeuf.vy > 0 && oeuf.y + oeuf.h - oeuf.vy <= b.y + 10) {
                oeuf.grounded = true; oeuf.vy = 0; oeuf.y = b.y - oeuf.h;
            } else if (oeuf.vx > 0 && oeuf.x + oeuf.w - oeuf.vx <= b.x) {
                oeuf.vx = 0; oeuf.x = b.x - oeuf.w;
            } else if (oeuf.vx < 0 && oeuf.x - oeuf.vx >= b.x + b.w) {
                oeuf.vx = 0; oeuf.x = b.x + b.w;
            }
        }
    });

    for (let i = 0; i < powerups.length; i++) {
        let pu = powerups[i];
        pu.x += pu.vx; pu.vy += gravity; pu.y += pu.vy;

        platforms.forEach(p => {
            if (pu.x < p.x + p.w && pu.x + pu.w > p.x && pu.y < p.y + p.h && pu.y + pu.h > p.y) {
                if (pu.vy > 0 && pu.y + pu.h - pu.vy <= p.y + 10) { pu.vy = -6; pu.y = p.y - pu.h; }
            }
        });

        if (oeuf.x < pu.x + pu.w && oeuf.x + oeuf.w > pu.x && oeuf.y < pu.y + pu.h && oeuf.y + pu.h > pu.y) {
            if (pu.type === 'star') {
                invincible = true; invincibilityTimer = 600; score += 500;
            } else if (pu.type === 'mega') {
                isMega = true; megaTimer = 600; score += 500;
            } else if (pu.type === 'jetpack') {
                hasJetpack = true; jetpackTimer = 600; score += 500;
            }
            powerups.splice(i, 1); i--;
        }
    }

    for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        
        if (Math.random() < 0.005) e.vx *= -1; 

        e.vy += gravity;
        e.y += e.vy;
        e.x += e.vx; 

        e.grounded = false;
        platforms.forEach(p => {
            if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h >= p.y - 15 && e.y + e.h <= p.y + 15 && e.vy >= 0) {
                e.grounded = true;
                e.vy = 0;
                e.y = p.y - e.h;
                if (e.x <= p.x || e.x + e.w >= p.x + p.w) e.vx *= -1; 
            }
        });
        pipes.forEach(p => {
            if (e.x < p.x + p.w && e.x + e.w > p.x && e.y + e.h > p.y) { e.vx *= -1; e.x += e.vx * 2; }
        });

        if (oeuf.x < e.x + e.w - 5 && oeuf.x + oeuf.w > e.x + 5 && oeuf.y < e.y + e.h && oeuf.y + oeuf.h > e.y) {
            if (invincible || isMega) {
                enemies.splice(i, 1); score += 200; i--;
            } else if (oeuf.vy > 0 && oeuf.y + oeuf.h - oeuf.vy <= e.y + 20) {
                oeuf.vy = -12; 
                enemies.splice(i, 1); score += 100; i--;
            } else {
                gameOver = true;
            }
        }
    }

    for (let i = 0; i < birds.length; i++) {
        let b = birds[i];
        b.x += b.vx;
        b.y = b.baseY + Math.sin(Date.now() / 200 + b.seed) * 30; 

        if (oeuf.x < b.x + b.w - 5 && oeuf.x + oeuf.w > b.x + 5 && oeuf.y < b.y + b.h && oeuf.y + oeuf.h > b.y) {
            if (invincible || isMega) {
                birds.splice(i, 1); score += 300; i--;
            } else if (oeuf.vy > 0 && oeuf.y + oeuf.h - oeuf.vy <= b.y + 15) {
                oeuf.vy = -12; 
                birds.splice(i, 1); score += 200; i--;
            } else {
                gameOver = true;
            }
        }
    }

    if (oeuf.y > canvas.height) gameOver = true;

    draw();
    if (!gameOver && !gameWon) { animationId = requestAnimationFrame(update); } 
    else if (gameOver) { drawGameOver(); }
  }

  function draw() {
    let t = themes[level > 5 ? 5 : level]; 

    let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, t.bg1);
    bgGrad.addColorStop(1, t.bg2);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (level >= 2 && level <= 4) {
        stars.forEach(s => {
            s.alpha += 0.02 * s.fadeDir;
            if(s.alpha > 1) { s.alpha = 1; s.fadeDir = -1; }
            if(s.alpha < 0.1) { s.alpha = 0.1; s.fadeDir = 1; }
            ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
    }

    if (welcomeTextInfo.active) {
        ctx.save();
        ctx.translate(welcomeTextInfo.x, welcomeTextInfo.y);

        let flicker = Math.sin(Date.now() / 150) * 0.2 + 0.8; 
        let glow = Math.sin(Date.now() / 150) * 10 + 15;
        let scale = Math.sin(Date.now() / 300) * 0.02 + 1.0; 
        ctx.scale(scale, scale);

        ctx.save();
        let signW = 600;
        let signH = 150;
        
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 5;
        ctx.shadowOffsetY = 10;

        let signGrad = ctx.createLinearGradient(0, -signH/2, 0, signH/2);
        signGrad.addColorStop(0, '#3e2723'); 
        signGrad.addColorStop(0.5, '#212121'); 
        signGrad.addColorStop(1, '#3e2723');
        ctx.fillStyle = signGrad;
        
        ctx.strokeStyle = '#B8860B'; 
        ctx.lineWidth = 8;
        
        ctx.beginPath();
        let r = 20; 
        let x = -signW/2, y = -signH/2, w = signW, h = signH;
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath(); 
        ctx.fill();
        ctx.stroke(); 
        
        ctx.fillStyle = '#FFD700'; 
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; 
        let rivetR = 6;
        let offset = 20;
        ctx.beginPath(); ctx.arc(-signW/2 + offset, -signH/2 + offset, rivetR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(signW/2 - offset, -signH/2 + offset, rivetR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(-signW/2 + offset, signH/2 - offset, rivetR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(signW/2 - offset, signH/2 - offset, rivetR, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 90px "Segoe UI", Arial, sans-serif';
        
        ctx.strokeStyle = 'rgba(0, 0, 0, 1.0)'; 
        ctx.lineWidth = 12; 
        ctx.lineJoin = 'round'; 
        ctx.strokeText("GOLDEN EGG", 0, 0); 

        ctx.shadowColor = '#FFFACD';
        ctx.shadowBlur = glow;
        
        let textGrad = ctx.createLinearGradient(0, -40, 0, 40);
        let flickerA = Math.max(0, flicker);
        textGrad.addColorStop(0, `rgba(255, 255, 224, ${flickerA})`); 
        textGrad.addColorStop(0.5, `rgba(255, 215, 0, ${flickerA})`); 
        textGrad.addColorStop(1, `rgba(184, 134, 11, ${flickerA})`); 
        ctx.fillStyle = textGrad;

        ctx.fillText("GOLDEN EGG", 0, 0); 

        // --- DESSIN DES TOUCHES WASD ---
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0; 
        
        function drawKey(keyStr, kx, ky) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.beginPath();
            ctx.roundRect(kx - 18, ky - 18, 36, 36, 5);
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#222';
            ctx.fillText(keyStr, kx, ky);
        }

        let keysY = 120; 
        drawKey('W', 0, keysY);
        drawKey('A', -42, keysY + 42);
        drawKey('S', 0, keysY + 42);
        drawKey('D', 42, keysY + 42);
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText("TO PLAY", 0, keysY + 85);

        ctx.restore();
    }

    clouds.forEach(c => {
        ctx.save();
        ctx.translate(c.x, c.y); ctx.scale(c.scale, c.scale);
        ctx.fillStyle = t.cloud;
        ctx.beginPath();
        ctx.arc(0, 0, 30, Math.PI * 0.5, Math.PI * 1.5);
        ctx.arc(35, -20, 40, Math.PI * 1, Math.PI * 2);
        ctx.arc(80, -10, 35, Math.PI * 1.2, Math.PI * 0);
        ctx.arc(100, 10, 20, Math.PI * 1.5, Math.PI * 0.5);
        ctx.moveTo(100, 30); ctx.lineTo(0, 30);
        ctx.fill(); ctx.restore();
    });

    if (finishLine) {
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(finishLine.x, finishLine.y, finishLine.w, finishLine.h);
        ctx.fillStyle = level === 5 ? '#000' : '#FFF';
        ctx.font = '20px Arial';
        ctx.fillText("END", finishLine.x - 5, finishLine.y - 10);
    }

    pipes.forEach(p => {
        if (p.hasPlant && p.pY < 0) {
            ctx.save();
            ctx.fillStyle = '#4CAF50'; 
            ctx.fillRect(p.x + 25, p.y + p.pY, 10, -p.pY); 
            ctx.fillStyle = '#E53935';
            ctx.beginPath(); ctx.arc(p.x + 30, p.y + p.pY + 10, 18, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(p.x + 30, p.y + p.pY - 2, 12, 0, Math.PI, true); ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath(); ctx.arc(p.x + 20, p.y + p.pY + 15, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(p.x + 40, p.y + p.pY + 12, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(p.x + 30, p.y + p.pY + 22, 2.5, 0, Math.PI*2); ctx.fill();
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(p.x + 18 + i*6, p.y + p.pY - 2);
                ctx.lineTo(p.x + 21 + i*6, p.y + p.pY + 5);
                ctx.lineTo(p.x + 24 + i*6, p.y + p.pY - 2);
                ctx.fill();
            }
            ctx.restore();
        }
    });

    pipes.forEach(p => {
        ctx.fillStyle = t.pipe1; ctx.fillRect(p.x, p.y + 20, p.w, p.h - 20); 
        ctx.fillStyle = t.pipe2; ctx.fillRect(p.x + p.w - 10, p.y + 20, 10, p.h - 20); 
        ctx.fillStyle = t.pipe1; ctx.fillRect(p.x - 4, p.y, p.w + 8, 20); 
        ctx.fillStyle = t.pipe2; ctx.fillRect(p.x + p.w - 6, p.y, 10, 20); 
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y + 20, p.w, p.h - 20); ctx.strokeRect(p.x - 4, p.y, p.w + 8, 20);
    });

    platforms.forEach(p => {
      let drawHeight = p.h > canvas.height ? canvas.height : p.h;
      ctx.fillStyle = t.pSide; 
      ctx.fillRect(p.x, p.y + 20, p.w, drawHeight - 20);
      let dirtGradient = ctx.createLinearGradient(p.x, p.y, p.x, p.y + drawHeight);
      dirtGradient.addColorStop(0, t.d1); 
      dirtGradient.addColorStop(1, t.d2); 
      ctx.fillStyle = dirtGradient; ctx.fillRect(p.x, p.y + 25, p.w, drawHeight - 25);
      
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      let s = p.seed;
      for(let i=0; i < p.w / 30; i++) {
          s = (s * 16807) % 2147483647; let dx = p.x + (s % p.w);
          s = (s * 16807) % 2147483647; let dy = p.y + 30 + (s % (drawHeight - 40));
          s = (s * 16807) % 2147483647; let size = 2 + (s % 4);
          if(dy < p.y + drawHeight - 10) { ctx.beginPath(); ctx.arc(dx, dy, size, 0, Math.PI*2); ctx.fill(); }
      }
      ctx.fillStyle = t.pTop; 
      ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, 25, [5, 5, 5, 5]); ctx.fill();
    });

    bricks.forEach(br => {
        ctx.fillStyle = t.d1; 
        ctx.fillRect(br.x, br.y, br.w, br.h);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(br.x, br.y, br.w, br.h);
        ctx.strokeStyle = t.d2; ctx.beginPath();
        ctx.moveTo(br.x, br.y + 20); ctx.lineTo(br.x + br.w, br.y + 20);
        ctx.moveTo(br.x + 10, br.y); ctx.lineTo(br.x + 10, br.y + 20);
        ctx.moveTo(br.x + 30, br.y + 20); ctx.lineTo(br.x + 30, br.y + br.h); ctx.stroke();
    });

    blocks.forEach(b => {
        ctx.fillStyle = b.active ? '#FFD700' : '#5D4037'; 
        ctx.fillRect(b.x, b.y + b.bounceY, b.w, b.h);
        ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.strokeRect(b.x, b.y + b.bounceY, b.w, b.h);
        if (b.active) {
            let bounceOffset = Math.sin(Date.now() / 150) * 3;
            ctx.fillStyle = '#FFF'; 
            ctx.font = 'bold 24px Arial';
            ctx.fillText("?", b.x + 12, b.y + b.bounceY + 30 + bounceOffset);
        }
    });

    powerups.forEach(pu => {
        ctx.save();
        if (pu.type === 'star') {
            ctx.translate(pu.x + pu.w/2, pu.y + pu.h/2);
            ctx.fillStyle = '#FFEB3B'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
            ctx.beginPath();
            for (let j=0; j<5; j++) {
                ctx.lineTo(Math.cos((18+j*72)*Math.PI/180)*12, -Math.sin((18+j*72)*Math.PI/180)*12);
                ctx.lineTo(Math.cos((54+j*72)*Math.PI/180)*5, -Math.sin((54+j*72)*Math.PI/180)*5);
            }
            ctx.closePath(); ctx.fill(); 
        } else if (pu.type === 'mega') {
            ctx.fillStyle = '#F44336'; ctx.beginPath(); ctx.arc(pu.x + 10, pu.y + 10, 10, Math.PI, 0); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.fillRect(pu.x + 4, pu.y + 10, 12, 8);
            ctx.beginPath(); ctx.arc(pu.x + 5, pu.y + 5, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(pu.x + 15, pu.y + 5, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(pu.x + 10, pu.y + 2, 3, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.strokeRect(pu.x + 4, pu.y + 10, 12, 8);
        } else {
            ctx.fillStyle = '#9E9E9E'; ctx.fillRect(pu.x+4, pu.y+4, 12, 16);
            ctx.fillStyle = '#FF5722'; ctx.beginPath(); ctx.arc(pu.x+10, pu.y+22, 4, 0, Math.PI); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.strokeRect(pu.x+4, pu.y+4, 12, 16);
        }
        ctx.restore();
    });

    particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color ? p.color : `rgba(200, 100, 50, ${Math.max(0, p.life)})`;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
    });

    enemies.forEach(e => {
        let yOffset = 0;
        if (!e.grounded) yOffset = -5; 
        drawRabbit(e.x, e.y, e.w, e.h, e.vx < 0, yOffset);
    });

    birds.forEach(b => { drawBird(b.x, b.y, b.vx < 0); });

    let isFlashing = false;
    if ((invincible && invincibilityTimer < 60) || (isMega && megaTimer < 60) || (hasJetpack && jetpackTimer < 60)) {
        isFlashing = Math.floor(Date.now() / 150) % 2 === 0;
    }

    ctx.save();
    if (isFlashing) ctx.globalAlpha = 0.4; 

    ctx.translate(oeuf.x + oeuf.w/2, oeuf.y + oeuf.h/2);
    ctx.rotate(oeufRotation);
    
    let scaleX = oeuf.w / 34;
    let scaleY = oeuf.h / 44;
    ctx.scale(scaleX, scaleY);

    if (hasJetpack) {
        ctx.fillStyle = '#9E9E9E'; ctx.fillRect(-15, -10, 10, 20);
        ctx.fillStyle = '#616161'; ctx.fillRect(-12, -8, 4, 16);
    }

    let eggGradient = ctx.createRadialGradient(-5, -5, 5, 0, 0, 44);
    if (invincible && Math.floor(Date.now() / 50) % 2 === 0) {
        eggGradient.addColorStop(0, '#FFF');   
        eggGradient.addColorStop(0.5, 'hsl(' + (Date.now() % 360) + ', 100%, 50%)'); 
        eggGradient.addColorStop(1, '#FFF'); 
    } else {
        eggGradient.addColorStop(0, '#FFFACD');   
        eggGradient.addColorStop(0.4, '#FFD700'); 
        eggGradient.addColorStop(1, '#B8860B');   
    }

    ctx.fillStyle = eggGradient; ctx.beginPath(); ctx.ellipse(0, 0, 17, 22, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-5, 5); ctx.lineTo(5, -5); ctx.lineTo(12, 0); ctx.stroke();
    ctx.lineWidth = 2; ctx.strokeStyle = '#5D4037'; 
    ctx.beginPath(); ctx.ellipse(0, 0, 17, 22, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath();
    ctx.ellipse(-7, -10, 4, 6, Math.PI/4, 0, Math.PI*2); ctx.fill();
    
    ctx.restore();

    ctx.fillStyle = level === 5 ? '#000' : '#FFF'; 
    ctx.font = 'bold 32px "Segoe UI", Arial, sans-serif';
    ctx.shadowColor = level === 5 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.5)'; 
    ctx.shadowBlur = 4;
    ctx.fillText("SCORE: " + Math.floor(score) + " | LEVEL: " + level + "/5", 30, 50);
    
    if (invincible) { ctx.fillStyle = '#FFD700'; ctx.fillText("STAR POWER! " + Math.ceil(invincibilityTimer/60) + "s", 30, 90); }
    else if (isMega) { ctx.fillStyle = '#FF5252'; ctx.fillText("MEGA EGG! " + Math.ceil(megaTimer/60) + "s", 30, 90); }
    else if (hasJetpack) { ctx.fillStyle = '#00BCD4'; ctx.fillText("JETPACK! " + Math.ceil(jetpackTimer/60) + "s", 30, 90); }
    ctx.shadowBlur = 0; 
  }

  function drawVictory() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; 
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#FFD700'; 
      ctx.font = 'bold 80px "Segoe UI", Arial, sans-serif'; 
      ctx.textAlign = 'center';
      ctx.fillText("VICTORY!", canvas.width / 2, canvas.height / 2 - 100);
      
      ctx.fillStyle = '#FFF'; 
      ctx.font = 'bold 40px "Segoe UI", Arial, sans-serif';
      ctx.fillText("Code: " + victoryCode, canvas.width / 2, canvas.height / 2 - 20);
      
      ctx.fillStyle = '#4CAF50'; 
      ctx.font = '24px "Segoe UI", Arial, sans-serif';
      ctx.fillText("Send this code + your Solana wallet to our Telegram", canvas.width / 2, canvas.height / 2 + 50);
      ctx.fillText("to see what the Golden Egg holds for you!", canvas.width / 2, canvas.height / 2 + 90);
      
      ctx.textAlign = 'left'; 
  }

  function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#FFF'; ctx.font = 'bold 60px "Segoe UI", Arial, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 50);
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 30px "Segoe UI", Arial, sans-serif';
      ctx.fillText("SCORE: " + Math.floor(score), canvas.width / 2, canvas.height / 2 + 10);
      
      ctx.fillStyle = '#4CAF50'; ctx.font = '24px "Segoe UI", Arial, sans-serif';
      ctx.fillText("SPACE / ENTER : Restart Level " + level + "/5", canvas.width / 2, canvas.height / 2 + 70);
      
      ctx.fillStyle = '#F44336';
      ctx.fillText("Press R : Restart Game", canvas.width / 2, canvas.height / 2 + 110);
      ctx.textAlign = 'left'; 
  }
  
  initGame();
  update();
</script>
</body>
